name: CI

on:
  push:
    branches: [ "master", "ci/*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tests/clients/go/go.sum
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven
          cache-dependency-path: tests/clients/java/pom.xml
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          check-latest: true
      - name: Install libmaxminddb from source
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool
          git clone --depth 1 --branch 1.13.2 https://github.com/maxmind/libmaxminddb.git /tmp/libmaxminddb
          cd /tmp/libmaxminddb
          ./bootstrap && ./configure && make -j$(nproc) && sudo make install
          sudo ldconfig
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Test
        run: tox -e py
      - name: Lint
        if: matrix.python-version == '3.13'
        run: tox -e lint
